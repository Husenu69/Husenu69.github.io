<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prestige Doors — Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A96E;--gold-b:#EDD28A;--dark:#0D0B08;
  --glass:rgba(10,8,5,0.55);--gbr:rgba(255,255,255,0.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'DM Sans',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}

/* PROGRESS */
.prog{position:fixed;top:0;left:0;right:0;height:2.5px;z-index:400;background:rgba(255,255,255,0.08);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-b));transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0;}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;height:58px;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(to bottom,rgba(13,11,8,0.95) 0%,rgba(13,11,8,0) 100%);}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:#fff;letter-spacing:2.5px;text-transform:uppercase;}
.logo em{color:var(--gold);font-style:normal;}
.topbar-btns{display:flex;gap:8px;}
.tbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:22px;font-size:11px;font-weight:600;letter-spacing:0.8px;cursor:pointer;border:1px solid var(--gbr);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.tbtn svg{width:13px;height:13px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tbtn-home{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);}
.tbtn-home:active{background:rgba(255,255,255,0.15);}
.tbtn-contact{background:var(--gold);color:#0D0B08;border-color:var(--gold);font-weight:700;}
.tbtn-contact:active{background:var(--gold-b);}

/* FEED */
.feed-wrap{position:fixed;inset:0;overflow:hidden;}
.feed{display:flex;flex-direction:column;transition:transform .48s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform;}

/* SLIDE */
.slide{position:relative;width:100vw;height:100vh;flex-shrink:0;overflow:hidden;}
.slide-placeholder{position:absolute;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:110px;letter-spacing:-4px;color:rgba(201,169,110,0.07);pointer-events:none;}
.slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 7s ease-out;transform:scale(1.06);}
.slide.active .slide-img{transform:scale(1);}
.vig{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(13,11,8,0.55) 0%,transparent 20%),linear-gradient(to top,rgba(13,11,8,0.9) 0%,rgba(13,11,8,0.25) 50%,transparent 75%);}

/* BADGE */
.badge{position:absolute;top:66px;left:16px;z-index:5;background:var(--glass);border:1px solid var(--gbr);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:4px 13px;font-size:10px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase;}
.badge em{color:var(--gold);font-style:normal;font-weight:700;}

/* INFO */
.info{position:absolute;bottom:0;left:0;right:72px;padding:0 20px 38px;z-index:10;}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(201,169,110,0.14);border:1px solid rgba(201,169,110,0.32);color:var(--gold-b);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;padding:5px 12px;border-radius:20px;margin-bottom:12px;}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);}
.info-title{font-family:'Playfair Display',serif;font-size:29px;line-height:1.1;color:#fff;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,0.6);}
.info-desc{font-size:13px;line-height:1.62;color:rgba(255,255,255,0.65);font-weight:300;max-width:275px;margin-bottom:18px;}
.cta{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#0D0B08;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:11px 22px;border-radius:26px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;box-shadow:0 6px 28px rgba(201,169,110,0.4);transition:transform .15s,box-shadow .15s;}
.cta:active{transform:scale(0.93);}
.cta svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

/* SIDE ACTIONS */
.acts{position:absolute;right:10px;bottom:95px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:22px;}
.act{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.act-c{width:50px;height:50px;border-radius:50%;background:var(--glass);border:1px solid var(--gbr);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s,border-color .2s;}
.act:active .act-c{transform:scale(0.85);}
.act-c svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.act-c.fav svg{stroke:var(--gold);}
.act-c.fav{background:rgba(201,169,110,0.22);border-color:rgba(201,169,110,0.45);}
.act-lbl{font-size:10px;color:rgba(255,255,255,0.5);font-weight:500;}

/* NAV DOTS */
.dots{position:fixed;right:0;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 9px;z-index:200;}
.dot{width:3px;border-radius:3px;background:rgba(255,255,255,0.2);transition:all .35s cubic-bezier(.4,0,.2,1);height:13px;cursor:pointer;}
.dot.on{height:30px;background:var(--gold);}

/* ARROW BUTTONS */
.arrows{position:fixed;right:15px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:250;}
.arr{width:40px;height:40px;border-radius:50%;background:rgba(13,11,8,0.65);border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,opacity .35s,visibility .35s;}
.arr:active{transform:scale(0.86);}
.arr svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.arr.hide{opacity:0;pointer-events:none;visibility:hidden;}
.arr-sep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.12);}

/* SWIPE HINT */
.hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:300;pointer-events:none;animation:hfade 4s 1.5s forwards;}
.hint-icon{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hint-icon svg{width:20px;height:20px;fill:none;stroke:rgba(255,255,255,0.4);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.hint-icon svg:nth-child(1){animation:aUp .9s ease-in-out infinite alternate;}
.hint-icon svg:nth-child(2){animation:aDn .9s ease-in-out infinite alternate;}
.hint-txt{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:500;}
@keyframes hfade{0%{opacity:1}75%{opacity:.4}100%{opacity:0}}
@keyframes aUp{from{transform:translateY(0)}to{transform:translateY(-5px)}}
@keyframes aDn{from{transform:translateY(0)}to{transform:translateY(5px)}}

/* FLASH */
.flash{position:fixed;inset:0;z-index:500;pointer-events:none;background:rgba(201,169,110,0.07);opacity:0;transition:opacity .12s;}
.flash.on{opacity:1;}
</style>
</head>
<body>

<div class="prog"><div class="prog-fill" id="prog"></div></div>

<header class="topbar">
  <div class="logo"><em>PRESTIGE</em> DOORS</div>
  <div class="topbar-btns">
    <button class="tbtn tbtn-home" onclick="goHome()">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
      Home
    </button>
    <button class="tbtn tbtn-contact" onclick="goContact()">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Contact Us
    </button>
  </div>
</header>

<div class="arrows">
  <div class="arr hide" id="aUp" onclick="nav(-1)">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </div>
  <div class="arr-sep"></div>
  <div class="arr" id="aDown" onclick="nav(1)">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>

<nav class="dots" id="dots"></nav>

<div class="feed-wrap">
  <div class="feed" id="feed"></div>
</div>

<div class="hint">
  <div class="hint-icon">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="hint-txt">Swipe or use the arrows</div>
</div>

<div class="flash" id="flash"></div>

<script>
// ─────────────────────────────────────────────
//  DOOR DATA
//  src: path to your image (e.g. "images/door1.jpg")
//       if the image is missing, a dark gradient placeholder shows instead
//  bg:  placeholder gradient colour
// ─────────────────────────────────────────────
const doors = [
  {
    src:   "images/tugstonebaia.jpg",
    bg:    "linear-gradient(145deg,#1a1108 0%,#2e1e0a 40%,#1a1108 100%)",
    cat:   "Tungstone Series · No.01",
    title: "Baia Collection",
    desc:  "Mediterranean elegance redefined. UV-treated natural oak veneer, fully weatherproof for the British climate."
  },
  {
    src:   "images/usa tungstone.jpg",
    bg:    "linear-gradient(145deg,#0d1318 0%,#1a2a34 40%,#0d1318 100%)",
    cat:   "Tungstone Series · No.02",
    title: "Heritage Oak",
    desc:  "Tradition and modernity in perfect balance. Solid American oak frame with triple-glazed security glass."
  },
  {
    src:   "images/door3.jpg",
    bg:    "linear-gradient(145deg,#10100e 0%,#232220 40%,#10100e 100%)",
    cat:   "Premium Line · No.03",
    title: "Grand Entrance",
    desc:  "A first impression that lasts. Architectural design with satin nickel hardware and a thermally broken frame."
  },
  {
    src:   "images/door4.jpg",
    bg:    "linear-gradient(145deg,#0e1214 0%,#1c2830 40%,#0e1214 100%)",
    cat:   "Scandinavian · No.04",
    title: "Nordic Frost",
    desc:  "Nordic minimalism at its finest. Clean lines, frosted glass and a flush anodised aluminium handle."
  },
  {
    src:   "images/door5.jpg",
    bg:    "linear-gradient(145deg,#0f0c09 0%,#221a0e 40%,#0f0c09 100%)",
    cat:   "Luxury Series · No.05",
    title: "Ebony Classic",
    desc:  "Ebony-stained hardwood paired with solid brass fittings. A bespoke piece for exceptional homes."
  },
];

let cur = 0, busy = false;
const T = doors.length;
const feed   = document.getElementById("feed");
const prog   = document.getElementById("prog");
const dotsEl = document.getElementById("dots");
const aUp    = document.getElementById("aUp");
const aDown  = document.getElementById("aDown");
const flash  = document.getElementById("flash");

// Build slides
doors.forEach((d, i) => {
  const s = document.createElement("div");
  s.className = "slide" + (i === 0 ? " active" : "");

  const ph = document.createElement("div");
  ph.className = "slide-placeholder";
  ph.style.background = d.bg;
  ph.textContent = String(i + 1).padStart(2, "0");

  const img = document.createElement("img");
  img.className = "slide-img";
  img.alt = d.title;
  img.loading = i === 0 ? "eager" : "lazy";
  img.style.background = d.bg;
  img.src = d.src;
  img.onerror = () => { img.style.opacity = "0"; };

  s.appendChild(ph);
  s.appendChild(img);
  s.insertAdjacentHTML("beforeend", `
    <div class="vig"></div>
    <div class="badge">Door <em>${String(i+1).padStart(2,"0")}</em> of ${T}</div>
    <div class="info">
      <div class="tag">${d.cat}</div>
      <div class="info-title">${d.title}</div>
      <div class="info-desc">${d.desc}</div>
      <button class="cta" onclick="getQuote('${d.title}')">
        Get a Quote
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
    <div class="acts">
      <div class="act" onclick="toggleSave(this,${i})">
        <div class="act-c" id="fc${i}">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="act-lbl">Save</span>
      </div>
      <div class="act" onclick="shareSlide('${d.title}')">
        <div class="act-c">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <span class="act-lbl">Share</span>
      </div>
      <div class="act" onclick="goContact()">
        <div class="act-c">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <span class="act-lbl">Call</span>
      </div>
    </div>
  `);
  feed.appendChild(s);
});

// Build dots
doors.forEach((_, i) => {
  const d = document.createElement("div");
  d.className = "dot" + (i === 0 ? " on" : "");
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function upUI() {
  prog.style.width = ((cur + 1) / T * 100) + "%";
  dotsEl.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("on", i === cur));
  aUp.classList.toggle("hide", cur === 0);
  aDown.classList.toggle("hide", cur === T - 1);
}

function goTo(idx) {
  if (busy || idx === cur || idx < 0 || idx >= T) return;
  busy = true;
  flash.classList.add("on");
  setTimeout(() => flash.classList.remove("on"), 140);
  feed.children[cur].classList.remove("active");
  cur = idx;
  feed.children[cur].classList.add("active");
  feed.style.transform = `translateY(-${cur * 100}vh)`;
  upUI();
  setTimeout(() => busy = false, 520);
}

function nav(d) { goTo(cur + d); }

// Touch
let ty = 0;
document.addEventListener("touchstart", e => { ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener("touchend",   e => {
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 50) nav(dy > 0 ? 1 : -1);
}, { passive: true });

// Wheel
let wcd = false;
document.addEventListener("wheel", e => {
  if (wcd || busy) return; wcd = true;
  nav(e.deltaY > 0 ? 1 : -1);
  setTimeout(() => wcd = false, 600);
}, { passive: true });

// Keys
document.addEventListener("keydown", e => {
  if (e.key === "ArrowDown" || e.key === "ArrowRight") nav(1);
  if (e.key === "ArrowUp"   || e.key === "ArrowLeft")  nav(-1);
});

// Actions
const saved = new Set();
function toggleSave(el, i) {
  const c = document.getElementById("fc" + i);
  saved.has(i) ? (saved.delete(i), c.classList.remove("fav")) : (saved.add(i), c.classList.add("fav"));
}
function shareSlide(t) {
  if (navigator.share) navigator.share({ title: "Prestige Doors — " + t, url: location.href });
  else alert("Copy the link from your address bar to share!");
}
function getQuote(t) { window.location.href = "contact.html?model=" + encodeURIComponent(t); }
function goHome()     { window.location.href = "index.html"; }
function goContact()  { window.location.href = "contact.html"; }

upUI();
</script>
</body>
</html>
