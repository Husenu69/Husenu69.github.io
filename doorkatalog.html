<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door Catalogue</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Montserrat&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#111;
  --gold:#c9a96e;
  --gold-light:#e8d5b0;
  --cream:#1a1a1a;
}

body {
  background:var(--bg);
  font-family:Montserrat;
  overflow:hidden;
}

/* HEADER */
.header {
  position:fixed;
  top:0; left:0; right:0;
  padding:20px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

.brand {
  font-family:"Cormorant Garamond";
  font-size:22px;
  color:white;
}

.brand em { color:var(--gold); }

.counter { color:var(--gold); }

/* HOME BUTTON (fara cerc) */
.home-btn {
  position:fixed;
  top:20px;
  left:20px;
  background:none;
  border:none;
  color:var(--gold);
  font-size:18px;
  cursor:pointer;
}

/* BOOK */
.book {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:360px;
  height:520px;
  perspective:1800px;
}

.page {
  position:absolute;
  width:100%;
  height:100%;
  background:var(--cream);
  border-radius:6px;
  overflow:hidden;
  transform-origin:left;
  backface-visibility:hidden;
}

.page img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SHADOW + REAL EFFECT */
.page::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,0.4), transparent 40%);
  opacity:0;
  pointer-events:none;
}

/* FLIP */
.page.flip {
  animation:flip 0.7s ease forwards;
}

@keyframes flip {
  0% { transform:rotateY(0); }
  50% { transform:rotateY(-90deg); }
  100% { transform:rotateY(-180deg); }
}

.page.flip::after {
  animation:shade 0.7s;
}

@keyframes shade {
  0% { opacity:0; }
  50% { opacity:0.7; }
  100% { opacity:0; }
}

/* TEXT */
.info {
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  color:white;
}

.title { font-size:22px; }

.subtitle {
  font-size:11px;
  color:var(--gold-light);
}

/* HINT */
.hint {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  color:var(--gold);
  font-size:11px;
}

/* DOTS */
.dots {
  position:fixed;
  bottom:25px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:6px;
}

.dot {
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--gold-light);
}

.dot.active { background:var(--gold); }

.home-btn {
  position: fixed;
  top: 20px;
  right: 20px;   /* 🔥 aici e schimbarea */
  left: auto;    /* important */
  
  background: rgba(0,0,0,0.4);
  border: 1px solid #c9a96e;
  color: #c9a96e;

  padding: 6px 12px;
  border-radius: 20px;

  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  z-index: 100;
  font-family: 'Montserrat', sans-serif;

  backdrop-filter: blur(6px);
}


.home-btn:hover {
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="home-btn" onclick="goHome()">Home...........</button>
  <br>
  
  <div id="counter">0 / 0</div>
</div>

<!-- HOME -->
<button class="home-btn" onclick="goHome()">←</button>

<!-- BOOK -->
<div class="book" id="book"></div>

<!-- HINT -->
<div class="hint">
  Tap right → next • Tap left → back
</div>

<!-- DOTS -->
<div class="dots" id="dots"></div>

<script>

/* 🔥 IMAGES */
const images = [
  "images/tugstonebaia.jpg",
  "images/usa tungstone.jpg",
  "images/door3.jpg",
  "images/door4.jpg",
  "images/door5.jpg"
];

let current = 0;
let animating = false;

const book = document.getElementById("book");
const counter = document.getElementById("counter");
const dots = document.getElementById("dots");

/* HOME */
function goHome() {
  window.location.href = "/index.html"; // merge la homepage
}

/* CREATE PAGE */
function createPage(index) {
  const page = document.createElement("div");
  page.className = "page";

  page.innerHTML = `
    <img src="${images[index]}">
    <div class="info">
      <div class="title">Door Model ${index+1}</div>
      <div class="subtitle">${index+1} / ${images.length}</div>
    </div>
  `;
  return page;
}

/* RENDER */
function render() {
  book.innerHTML = "";

  if (current + 1 < images.length) {
    const next = createPage(current + 1);
    book.appendChild(next);
  }

  const currentPage = createPage(current);
  currentPage.classList.add("current");
  book.appendChild(currentPage);

  counter.textContent = `${current+1} / ${images.length}`;

  dots.innerHTML = "";
  images.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === current ? " active" : "");
    dots.appendChild(d);
  });
}

/* FLIP */
function nextPage() {
  if (animating || current >= images.length - 1) return;
  animating = true;

  const page = document.querySelector(".current");
  page.classList.add("flip");

  page.addEventListener("animationend", () => {
    current++;
    render();
    animating = false;
  }, { once:true });
}

function prevPage() {
  if (animating || current <= 0) return;
  current--;
  render();
}

/* CLICK */
book.addEventListener("click", e => {
  const x = e.offsetX;
  if (x > book.clientWidth * 0.4) nextPage();
  else prevPage();
});

/* INIT */
render();

function goHome() {
  window.location.href = "/index.html";
}

</script>

</body>
</html>
