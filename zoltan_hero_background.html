
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; }
#hero {
  width: 100%;
  height: 520px;
  position: relative;
  overflow: hidden;
  border-radius: var(--border-radius-lg);
  font-family: var(--font-sans);
}
#bg-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.hero-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 2rem;
  z-index: 10;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.15);
  border: 0.5px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  padding: 6px 16px;
  font-size: 13px;
  color: #fff;
  letter-spacing: 0.02em;
  margin-bottom: 1.5rem;
  backdrop-filter: blur(4px);
}
.badge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
.hero-title {
  font-size: 46px;
  font-weight: 500;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 1rem;
}
.hero-title em {
  font-style: italic;
  color: #fbbf24;
}
.hero-sub {
  font-size: 17px;
  color: rgba(255,255,255,0.8);
  max-width: 440px;
  line-height: 1.6;
  margin-bottom: 2rem;
}
.hero-cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: #fff;
  color: #1e3a5f;
  border: none;
  border-radius: 999px;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  text-decoration: none;
}
.hero-cta:hover { transform: scale(1.03); }
.hero-stars {
  display: flex; align-items: center; gap: 6px;
  margin-top: 1.5rem;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}
.stars { color: #fbbf24; letter-spacing: 1px; }
</style>

<div id="hero">
  <canvas id="bg-canvas"></canvas>
  <div class="hero-content">
    <div class="badge">
      <span class="badge-dot"></span>
      Williamsburg, VA · Available now
    </div>
    <h1 class="hero-title">Your Appliance<br><em>Fixed Right.</em> Fast.</h1>
    <p class="hero-sub">Expert repair for all major household appliances. Honest pricing, work that lasts — backed by 10+ years of hands-on experience.</p>
    <a href="tel:+17578173934" class="hero-cta">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.64 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      (757) 817-3934
    </a>
    <div class="hero-stars">
      <span class="stars">★★★★★</span>
      <span>5.0 · 50+ verified reviews</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

let W, H, particles, tools;

const COLORS = {
  bg1: '#0d2a4a',
  bg2: '#1a3f6e',
  accent: '#2563eb',
  gold: '#d97706',
};

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W;
  canvas.height = H;
}

class Particle {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 10;
    this.r = 1 + Math.random() * 2;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -(0.3 + Math.random() * 0.6);
    this.alpha = 0.3 + Math.random() * 0.5;
    this.color = Math.random() > 0.7 ? COLORS.gold : '#7fb3f5';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -10) this.reset(false);
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class ToolIcon {
  constructor(emoji, x, y, size, speed, delay) {
    this.emoji = emoji;
    this.baseX = x;
    this.baseY = y;
    this.x = x; this.y = y;
    this.size = size;
    this.speed = speed;
    this.t = delay;
    this.alpha = 0.12 + Math.random() * 0.1;
  }
  update() {
    this.t += this.speed;
    this.y = this.baseY + Math.sin(this.t) * 14;
    this.x = this.baseX + Math.cos(this.t * 0.7) * 8;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, this.x, this.y);
    ctx.restore();
  }
}

function buildGrid() {
  const iconsData = ['🔧','❄️','🧊','👕','🌀','🍽','🔥','⚙️','🔩','🛠️'];
  tools = [];
  const cols = 5, rows = 4;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const xi = (c / (cols - 1)) * W;
      const yi = (r / (rows - 1)) * H;
      const emoji = iconsData[(r * cols + c) % iconsData.length];
      tools.push(new ToolIcon(emoji, xi, yi, 28 + Math.random() * 20, 0.008 + Math.random() * 0.012, Math.random() * Math.PI * 2));
    }
  }
}

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#0a2240');
  grad.addColorStop(0.5, '#173a6a');
  grad.addColorStop(1, '#0a2240');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const radial = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.6);
  radial.addColorStop(0, 'rgba(37, 99, 235, 0.18)');
  radial.addColorStop(1, 'rgba(37, 99, 235, 0)');
  ctx.fillStyle = radial;
  ctx.fillRect(0, 0, W, H);
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(100, 160, 255, 0.06)';
  ctx.lineWidth = 0.5;
  const step = 48;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

let frame = 0;
function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawGrid();
  tools.forEach(t => { t.update(); t.draw(); });
  particles.forEach(p => { p.update(); p.draw(); });

  if (frame % 2 === 0) {
    ctx.strokeStyle = 'rgba(251, 191, 36, 0.12)';
    ctx.lineWidth = 0.5;
    const now = frame * 0.008;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 4) {
      const y = H * 0.75 + Math.sin(x * 0.015 + now) * 18 + Math.sin(x * 0.03 + now * 1.5) * 8;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.strokeStyle = 'rgba(99, 160, 255, 0.1)';
    ctx.beginPath();
    for (let x = 0; x <= W; x += 4) {
      const y = H * 0.25 + Math.sin(x * 0.012 - now * 0.8) * 12 + Math.cos(x * 0.025 + now) * 6;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  frame++;
  requestAnimationFrame(animate);
}

function init() {
  resize();
  particles = Array.from({length: 60}, () => new Particle());
  buildGrid();
  animate();
}

window.addEventListener('resize', () => { resize(); buildGrid(); });
init();
</script>
