<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProApex People</title>
<style>
/* Reset și font */
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background-color: #f8f9fa;
  color: #333;
}

/* Header */
header {
  background-color: #0d6efd;
  color: white;
  padding: 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 2em;
}

/* Galerie Acordeon */
.accordion-gallery {
  display: flex;
  max-width: 900px;
  margin: 40px auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.accordion-gallery div {
  flex: 1;
  background-size: cover;
  background-position: center;
  transition: flex 0.5s ease;
  cursor: pointer;
  position: relative;
}

.accordion-gallery div span {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  font-weight: bold;
  background: rgba(0,0,0,0.4);
  padding: 5px 10px;
  border-radius: 5px;
}

/* Hover desktop */
.accordion-gallery div:hover {
  flex: 3;
}

/* Mobile tap */
@media (max-width: 768px) {
  .accordion-gallery {
    flex-direction: column;
  }
  .accordion-gallery div {
    flex: none;
    height: 200px;
  }
  .accordion-gallery div.active {
    height: 400px;
  }
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background-color: #0d6efd;
  color: white;
  margin-top: 40px;
}
</style>
</head>
<body>

<header>
  <h1>ProApex People</h1>
  <p>Galeria noastră cu oameni importanți</p>
</header>

<!-- Galerie Acordeon -->
<div class="accordion-gallery">
  <div style="background-image: url('https://via.placeholder.com/600x400?text=Eu');"><span>Eu</span></div>
  <div style="background-image: url('https://via.placeholder.com/600x400?text=Mark');"><span>Mark</span></div>
  <div style="background-image: url('https://via.placeholder.com/600x400?text=Al+Treilea');"><span>Al Treilea</span></div>
</div>

<footer>
  &copy; 2025 ProApex. Toate drepturile rezervate.
</footer>

<script>
// Mobile tap functionality
const items = document.querySelectorAll('.accordion-gallery div');
items.forEach(item => {
  item.addEventListener('click', () => {
    // Dezactivează toate
    items.forEach(i => i.classList.remove('active'));
    // Activează doar cel selectat
    item.classList.add('active');
  });
});
</script>

</body>
</html>
